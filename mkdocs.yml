site_name: DOCS COINS 2026.1
theme:
  name: material
  language: pt-BR
  palette:
    primary: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - awesome-pages
  - minify
  - mermaid2
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime

markdown_extensions:
  - admonition
  - toc:
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Início: index.md
  - Arquitetura:
      - Especificação Arquitetural: arquitetura/especificacao-arquitetural.md
      - Diagramas C4: arquitetura/diagramas-c4.md
      - Visão de Implementação: arquitetura/visao-de-implementacao.md
      - Registro de Decisões Arquiteturais: arquitetura/adr-coins.md
  - Requisitos:
      - Apuração de Regras: requisitos/apuracao-regras.md
      - DRE e Regras: requisitos/DRE-regras.md
      - Balanço Patrimonial: requisitos/balanco-patrimonial-regras.md
      - Especificação de Requisitos de Software: requisitos/especificacao-de-requisitos-de-software.md
      - Fundamento e Estrutura de Requisitos: requisitos/fundamento-estrutura-requisitos.md
      - Glossário de Termos: requisitos/glossario-de-termos.md
  - IHC:
      - Identidade Visual: ihc/identidade-visual.md
  - Banco de Dados:
      - Documentação do Modelo de Dados: banco-de-dados/documentacao-modelo-dados.md
      - Dicionário de Dados: banco-de-dados/dicionario-dados.md
  - Qualidade e Testes:
      - Plano de Testes: qualidade-testes/plano-de-testes.md
  - IA:
      - Política de Uso de IA: gerencia-projeto/politica-uso-ia.md
      - Instruções do Copilot: devops/instrucoes-do-copilot.md
  - Gerência de Projeto:
      - Plano de Projeto: gerencia-projeto/plano-do-projeto.md
      - Template de Documento: gerencia-projeto/template-de-documento.md
  - DevOps:
      - Visão Geral: devops/visao-geral.md
      - Diretrizes de Gerência de Configuração: devops/diretrizes-gerencia-configuracao.md
      - Modelo de Ramificação: devops/modelo-ramificacao.md
      - Versionamento: devops/versionamento.md
      - Padrão de Commits: devops/padrao-commits.md
      - Fluxo: devops/fluxo.md
      - DoD: devops/dod.md
      - CI/CD: devops/infraestrutura.md
      - Pull Request Template: devops/pull-request-template.md
  - Decisões:
      - Diário de Decisões: decisoes/decisoes.md
      - Decisões Importadas: decisoes/diario-de-decisoes-importado.md
      - Template de RD: decisoes/rd-template.md
