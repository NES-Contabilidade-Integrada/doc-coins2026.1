site_name: Documentação do COIN'S
theme:
  name: material
  custom_dir: docs/overrides
  language: pt-BR
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    primary: custom
  icon:
    repo: material/download
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate

repo_url: https://github.com/NES-Contabilidade-Integrada/coins2026.1/releases/latest
repo_name: Download COIN'S

copyright: Núcleo de Práticas de Engenharia de Software | UFMS

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - awesome-pages
  - minify
  - mermaid2
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime

markdown_extensions:
  - admonition
  - toc:
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Início: index.md
  - Uso do Sistema:
      - Exemplos de Lançamentos: uso-do-sistema/exemplos-lancamentos.md
  - IHC:
      - Visão Geral: ihc/visao-geral.md
      - Identidade Visual: ihc/identidade-visual.md
      - Jornada do Usuário: ihc/jornada-usuario.md
      - Termo de Consentimento: ihc/termo-consentimento-usabilidade.md
      - Roteiro de Teste de Usabilidade: ihc/roteiro-teste-usabilidade.md
      - Relatório de Teste de Usabilidade: ihc/relatorio-teste-usabilidade.md
  - Requisitos:
      - Especificação de Requisitos de Software: requisitos/especificacao-de-requisitos-de-software.md
      - Modelo de Descoberta: requisitos/modelo-de-descoberta.md
      - Glossário de Termos: requisitos/glossario-de-termos.md
      - Fundamento e Estrutura de Requisitos: requisitos/fundamento-estrutura-requisitos.md
  - Arquitetura:
      - Especificação Arquitetural: arquitetura/especificacao-arquitetural.md
      - Diagramas C4: arquitetura/diagramas-c4.md
      - Visão de Implementação: arquitetura/visao-de-implementacao.md
      - Registro de Decisões Arquiteturais: arquitetura/adr-coins.md
  - Banco de Dados:
      - Documentação do Modelo de Dados: banco-de-dados/documentacao-modelo-dados.md
      - Dicionário de Dados: banco-de-dados/dicionario-dados.md
  - IA:
      - Política de Uso de IA: ia/politica-uso-ia.md
      - Instruções do Copilot: ia/instrucoes-do-copilot.md
  - Qualidade e Testes:
      - Plano de Testes: qualidade-testes/plano-de-testes.md
  - DevOps:
      - Visão Geral: devops/visao-geral.md
      - Diretrizes de Gerência de Configuração: devops/diretrizes-gerencia-configuracao.md
      - Modelo de Ramificação: devops/modelo-ramificacao.md
      - Versionamento: devops/versionamento.md
      - Padrão de Commits: devops/padrao-commits.md
      - Fluxo: devops/fluxo.md
      - DoD: devops/dod.md
      - CI/CD: devops/infraestrutura.md
      - Pull Request Template: devops/pull-request-template.md
      - Geração do Executável: devops/geracao-executavel.md
  - Gerência de Projeto:
      - Análise Preliminar: gerencia-projeto/analise-preliminar.md
      - Plano de Projeto: gerencia-projeto/plano-do-projeto.md
      - Encerramento do Projeto: gerencia-projeto/encerramento-do-projeto.md
      - Template de Documento: gerencia-projeto/template-de-documento.md
  - Decisões:
      - Diário de Decisões: decisoes/decisoes.md
      - Decisões Importadas: decisoes/diario-de-decisoes-importado.md
