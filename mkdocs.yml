site_name: COINS NES 2026.1
theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - awesome-pages
  - minify
  - mermaid2
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

nav:
  - Início: index.md
  - Arquitetura:
      - Visão Geral: arquitetura/visao-geral.md
      - Diagramas: arquitetura/diagramas.md
      - Decisões Arquiteturais: arquitetura/decisoes-arquiteturais.md
  - Requisitos:
      - Visão do Produto: requisitos/visao-produto.md
      - Requisitos Funcionais: requisitos/requisitos-funcionais.md
      - Requisitos Não Funcionais: requisitos/requisitos-nao-funcionais.md
      - Histórias de Usuário: requisitos/historias-usuario.md
  - Banco de Dados:
      - Modelo Conceitual: banco-de-dados/modelo-conceitual.md
      - Modelo Lógico: banco-de-dados/modelo-logico.md
      - Dicionário de Dados: banco-de-dados/dicionario-dados.md
  - IHC:
      - Personas: ihc/personas.md
      - Jornada do Usuário: ihc/jornada-usuario.md
      - Protótipos: ihc/prototipos.md
  - Qualidade e Testes:
      - Estratégia de Testes: qualidade-testes/estrategia-testes.md
      - Casos de Teste: qualidade-testes/casos-teste.md
      - Cobertura: qualidade-testes/cobertura.md
  - Gerência de Projeto:
      - Planejamento: gerencia-projeto/planejamento.md
      - Cronograma: gerencia-projeto/cronograma.md
      - Riscos: gerencia-projeto/riscos.md
  - DevOps:
      - Visão Geral: devops/visao-geral.md
      - Modelo de Ramificação: devops/modelo-ramificacao.md
      - Versionamento: devops/versionamento.md
      - Padrao de Commits: devops/padrao-commits.md
      - Fluxo: devops/fluxo.md
      - DoD: devops/dod.md
      - CI/CD: devops/ci-cd.md
  - Decisões:
      - ADR 001 - Escolha de Arquitetura: decisoes/adr-001-escolha-arquitetura.md
      - ADR 002 - Escolha de Banco: decisoes/adr-002-escolha-banco.md
      - ADR Template: decisoes/adr-template.md
